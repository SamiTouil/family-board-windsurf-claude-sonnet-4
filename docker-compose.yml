version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: family-board-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - family-board-network

  # Test Database
  postgres-test:
    image: postgres:15-alpine
    container_name: family-board-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: family_board_test_db
    ports:
      - "5433:5432"
    networks:
      - family-board-network

  # Database Viewer (pgweb)
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: family-board-pgweb
    ports:
      - "${PGWEB_PORT}:8081"
    environment:
      PGWEB_DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - postgres
    networks:
      - family-board-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family-board-backend
    ports:
      - "${BACKEND_PORT}:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - family-board-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family-board-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      REACT_APP_DEFAULT_LANGUAGE: ${REACT_APP_DEFAULT_LANGUAGE}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - family-board-network

volumes:
  postgres_data:

networks:
  family-board-network:
    driver: bridge
